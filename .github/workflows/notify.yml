name: Notify Epic Free Games

on:
  # Primary trigger: an external scheduler (cron-job.org) POSTs a
  # repository_dispatch event at 11:00 AM IST sharp. Unlike `schedule`,
  # dispatch events are not deprioritized, so the run starts within seconds.
  # See README "Precise scheduling" for the cron-job.org setup.
  repository_dispatch:
    types: [run-notify]
  # Backup trigger: GitHub's own cron. Best-effort (often delayed 1-3h), but
  # free insurance if the external scheduler ever misses. Fires Fri/Sat/Sun.
  schedule:
    # ~11:17 AM IST (05:47 UTC). Off the half-hour to reduce GitHub queue delay.
    - cron: '47 5 * * 5,6,0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, skip email send + state save (just log what would happen)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Workflow-level permissions are restrictive; each job widens them only where needed.
permissions:
  contents: read

concurrency:
  group: notify-epic
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write   # needed to commit state/notified.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Send notification if there are new free games
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: '587'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO:  ${{ secrets.EMAIL_TO }}
          EMAIL_FROM_NAME: Epic Free Games Bot
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: npm start

      - name: Commit updated state
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          if [ -n "$(git status --porcelain state/notified.json 2>/dev/null)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/notified.json
            git commit -m "chore: update notified games state [skip ci]"
            git push
          else
            echo "No state changes to commit"
          fi

      - name: Email me if the job failed
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          from: Epic Free Games Bot <${{ secrets.SMTP_USER }}>
          to: ${{ secrets.EMAIL_TO }}
          subject: '[Epic Free Games Bot] Workflow failed'
          body: |
            The notifier workflow failed - check the logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Triggered by: ${{ github.event_name }}
            Branch: ${{ github.ref_name }}

  cleanup:
    runs-on: ubuntu-latest
    needs: notify
    if: always()
    permissions:
      actions: write   # needed to delete old workflow runs
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 2
