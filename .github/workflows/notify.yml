name: Notify Epic Free Games

on:
  schedule:
    # 11:00 AM IST on Friday, Saturday and Sunday (05:30 UTC).
    # Epic's weekly free games drop Thursday 10:30 PM IST; this catches them
    # on Friday morning and gives two backup chances over the weekend.
    - cron: '30 5 * * 5,6,0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, skip email send + state save (just log what would happen)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write   # to commit state file
  actions: write    # to delete old workflow runs

concurrency:
  group: notify-epic
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Send notification if there are new free games
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: '587'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO:  ${{ secrets.EMAIL_TO }}
          EMAIL_FROM_NAME: Epic Free Games Bot
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: npm start

      - name: Commit updated state
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          if [ -n "$(git status --porcelain state/notified.json 2>/dev/null)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/notified.json
            git commit -m "chore: update notified games state [skip ci]"
            git push
          else
            echo "No state changes to commit"
          fi

      - name: Email me if the job failed
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          from: Epic Free Games Bot <${{ secrets.SMTP_USER }}>
          to: ${{ secrets.EMAIL_TO }}
          subject: '[Epic Free Games Bot] Workflow failed'
          body: |
            The notifier workflow failed - check the logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Triggered by: ${{ github.event_name }}
            Branch: ${{ github.ref_name }}

  cleanup:
    runs-on: ubuntu-latest
    needs: notify
    if: always()
    permissions:
      actions: write
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 2
